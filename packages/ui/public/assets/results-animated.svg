<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <defs>
    <linearGradient id="mnemos-bar" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#c8f542"/>
    </linearGradient>
    <style>
      @keyframes grow80 { from { width: 0; } to { width: 400px; } }
      @keyframes grow0 { from { width: 0; } to { width: 8px; } }
      @keyframes grow29 { from { width: 0; } to { width: 380px; } }
      @keyframes grow016 { from { width: 0; } to { width: 22px; } }
      @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes count { from { opacity: 0; } 80% { opacity: 0; } to { opacity: 1; } }
      .b-acc-m { animation: grow80 1.8s ease-out .3s forwards; width: 0; }
      .b-acc-g { animation: grow0 1.8s ease-out .5s forwards; width: 0; }
      .b-tok-m { animation: grow29 1.8s ease-out 1s forwards; width: 0; }
      .b-tok-g { animation: grow016 1.8s ease-out 1.2s forwards; width: 0; }
      .card { animation: fade-in .6s ease-out both; }
      .c1 { animation-delay: 0s; }
      .c2 { animation-delay: .15s; }
      .c3 { animation-delay: .3s; }
      .val { animation: count 2.2s ease-out forwards; opacity: 0; }
    </style>
  </defs>
  <rect width="640" height="360" rx="20" fill="#fbfbfd"/>
  <rect x="1" y="1" width="638" height="358" rx="19" stroke="#e8e8ed" stroke-width="2"/>
  <text x="32" y="48" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#6366f1" font-weight="700" letter-spacing=".1em">VERIFIED BENCHMARK</text>
  <text x="32" y="80" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" fill="#111827" letter-spacing="-.03em">Mnemos vs alternatives</text>
  <text x="32" y="108" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#6b7280">expressjs/express � measured on real repos</text>

  <!-- Task accuracy -->
  <g class="card c1" transform="translate(32,132)">
    <text x="0" y="0" font-family="Inter,sans-serif" font-size="13" fill="#374151" font-weight="600">Task accuracy</text>
    <rect x="140" y="-12" width="400" height="22" rx="6" fill="#f3f4f6"/>
    <rect class="b-acc-m" x="140" y="-12" height="22" rx="6" fill="url(#mnemos-bar)"/>
    <text class="val" x="552" y="4" font-family="Inter,sans-serif" font-size="14" fill="#6366f1" font-weight="700">80%</text>
    <text x="140" y="28" font-family="Inter,sans-serif" font-size="11" fill="#9ca3af">Mnemos</text>
    <rect x="140" y="40" width="400" height="14" rx="4" fill="#f3f4f6"/>
    <rect class="b-acc-g" x="140" y="40" height="14" rx="4" fill="#d1d5db"/>
    <text x="160" y="52" font-family="Inter,sans-serif" font-size="11" fill="#9ca3af">Graphify � Gitingest  0%</text>
  </g>

  <!-- Compression -->
  <g class="card c2" transform="translate(32,228)">
    <text x="0" y="0" font-family="Inter,sans-serif" font-size="13" fill="#374151" font-weight="600">AI context compression</text>
    <rect x="140" y="-12" width="400" height="22" rx="6" fill="#f3f4f6"/>
    <rect class="b-tok-m" x="140" y="-12" height="22" rx="6" fill="url(#mnemos-bar)"/>
    <text class="val" x="552" y="4" font-family="Inter,sans-serif" font-size="14" fill="#6366f1" font-weight="700">29.9�</text>
    <rect x="140" y="40" width="400" height="14" rx="4" fill="#f3f4f6"/>
    <rect class="b-tok-g" x="140" y="40" height="14" rx="4" fill="#d1d5db"/>
    <text x="160" y="52" font-family="Inter,sans-serif" font-size="11" fill="#9ca3af">Gitingest expands context 0.16�</text>
  </g>

  <!-- stat pills -->
  <g class="card c3">
    <rect x="32" y="300" width="120" height="36" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="48" y="323" font-family="Inter,sans-serif" font-size="13" fill="#059669" font-weight="600">2 min TTU</text>
    <rect x="164" y="300" width="140" height="36" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="180" y="323" font-family="Inter,sans-serif" font-size="13" fill="#4f46e5" font-weight="600">5,942 tokens</text>
    <rect x="316" y="300" width="120" height="36" rx="10" fill="#faf5ff" stroke="#e9d5ff"/>
    <text x="332" y="323" font-family="Inter,sans-serif" font-size="13" fill="#7c3aed" font-weight="600">0.6s build</text>
  </g>
</svg>
