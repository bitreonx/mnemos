name: publish-npm

# Publishes getmnemos to npm via trusted publishing (OIDC) or NPM_TOKEN fallback

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish getmnemos to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node for trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build core package (dependency of CLI)
        run: npm run build --workspace @mnemos/core

      - name: Build CLI package
        run: npm run build --workspace getmnemos

      - name: Prepare self-contained bundle
        run: npm run prepare:publish --workspace getmnemos

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG does not match packages/cli/package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm (OIDC trusted publishing preferred)
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Restore package.json after publish
        if: always()
        run: node packages/cli/scripts/strip-publish-deps.mjs restore
